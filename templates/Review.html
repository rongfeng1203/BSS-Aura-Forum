<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RateMyTeach</title>
    <style>
        :root {
            --bg-main: #181717;
            --sidebar-bg: #181717;
            --accent: #ffffff;
            --text-main: #454545;
            --text-muted: #ffffff;
            --card-shadow: 0 4px 6px -1px rgba(170, 170, 170, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
        }

        /* SIDEBAR */
        nav {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #292929;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }
        nav a {
            text-decoration: none; 
            color: inherit;       
            display: block;      
        }

        nav h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 30px; }
        .nav-item { 
            text-decoration: none;
            color: #d1d5db;
            padding: 12px; 
            border-radius: 8px; 
            color: #ffffff; 
            cursor: pointer; 
            margin-bottom: 5px;
            transition: 0.2s;
            
        }

       
        .nav-item.active { background: #5b0c10; color: var(--accent);}

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 40px; }

        .header-row { color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* THE INPUT CARD */
        .input-card {
            background: rgb(19, 19, 19);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            background: black;
            border: 1px solid #464646;
            color: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent); }
        .btn-primary {
            background: #5b0c10;
            color: rgb(255, 255, 255);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        /* FEED CARDS */
        .post-card {
            background: rgb(126, 120, 120);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 16px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .post-card:hover { border-color: var(--accent); }
        
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }

        .post-time { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }
        .post-body { color: #000000; line-height: 1.5; }

    </style>
</head>
<body>
    <nav>
        <h2>RateMyTeach</h2>
            <div class="nav-item"><a href="RateMyTeach.html">Dashboard</a></div>
            <div class="nav-item"><a href="#">My Reviews</a></div>
            <div class="nav-item active"><a href="#">Write a Review</a></div>
            <div class="nav-item"><a href="#">Settings</a></div>
    </nav>
    <main>
        <div class="header-row">
            <h1>Write a Review</h1>
        </div>
        <div class="input-card">
            <input type="text" placeholder="Course Name">
            <input type="text" placeholder="Teacher Name">
            <textarea rows="5" placeholder="Write your review here..."></textarea>
            <button class="btn-primary">Submit Review</button>
        </div>
    </main>
</body>
</html>
