<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Dashboard</title>
    <style>
        :root {
            --bg-main: #181717;
            --sidebar-bg: #181717;
            --accent: #ffffff;
            --text-main: #454545;
            --text-muted: #ffffff;
            --card-shadow: 0 4px 6px -1px rgba(170, 170, 170, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
        }

        /* SIDEBAR */
        nav {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #292929;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        nav h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 30px; }
        .nav-item { 
            padding: 12px; 
            border-radius: 8px; 
            color: var(--text-muted); 
            cursor: pointer; 
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .nav-item.active { background: #5b0c10; color: var(--accent);}

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 40px; }

        .header-row { color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* THE INPUT CARD */
        .input-card {
            background: rgb(19, 19, 19);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            background: black;
            border: 1px solid #464646;
            color: white;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent); ring: 2px var(--accent); }

        .btn-primary {
            background: #5b0c10;
            color: rgb(255, 255, 255);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        /* FEED CARDS */
        .post-card {
            background: rgb(44, 44, 44);
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 16px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .post-card:hover { border-color: var(--accent); }
        
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }

        .post-time { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }
        .post-body { color: #000000; line-height: 1.5; }

    </style>
</head>
<body>

    <nav>
        <h2>BSSAuraForum</h2>
        <a class="nav-item active">General Discussion</a>
        <a class="nav-item">Study AI</a>
    </nav>

    <script>
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            // Remove 'active' class from all nav items
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            // Add 'active' class to the clicked item
            this.classList.add('active');
        });
    });
    </script>

    <main>
        <div class="header-row">
            <h1>Activity Feed</h1>
        </div>

        <div class="input-card">
            <textarea id="messageInput" placeholder="Share your thoughts..."></textarea>
            <button class="btn-primary" id="submitBtn">Post</button>
            <div id="statusMessage" style="color: white; font-size: 0.8rem; margin-top: 10px;"></div>
        </div>

        <div id="feed-container">
            </div>
    </main>

    <script>
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Configuration
        const PROXY_URL = 'insert proxy url here';
        
        const submitBtn = document.getElementById('submitBtn');
        const messageInput = document.getElementById('messageInput');
        const statusMessage = document.getElementById('statusMessage');
        const feedContainer = document.getElementById('feed-container');

        // Post Submission
        submitBtn.addEventListener('click', async () => {
            const body = messageInput.value.trim();
            
            if (!body) {
                statusMessage.innerText = "Please enter a message.";
                return;
            }

            submitBtn.disabled = true;
            statusMessage.innerText = "Syncing with GitHub...";

            try {
                const response = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ body: body })
                });

                if (response.ok) {
                    statusMessage.innerText = "Success! Post queued.";
                    messageInput.value = '';
                } else {
                    statusMessage.innerText = "Error: Post failed.";
                }
            } catch (err) {
                statusMessage.innerText = "Connection error.";
            } finally {
                submitBtn.disabled = false;
            }
        });

        // 4. Feed Rendering Logic
        // This helper creates the HTML for each card to match the .post-card CSS
        function createPostCard(text, time) {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <div class="post-header">
                    <strong style="color: white;">Anonymous User</strong>
                    <span class="post-time">${time}</span>
                </div>
                <div class="post-body" style="color: #ccc;">${text}</div>
            `;
            return card;
        }
    </script>
    
</body>
</html>
