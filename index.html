<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forum Dashboard</title>
    <style>
        :root {
            --bg-main: #F8F9FD;
            --sidebar-bg: #FFFFFF;
            --accent: #4e1720;
            --text-main: #371f22;
            --text-muted: #806b6c;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-main); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
        }

        /* SIDEBAR */
        nav {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid #E5E7EB;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        nav h2 { font-size: 1.2rem; color: var(--accent); margin-bottom: 30px; }
        .nav-item { 
            padding: 12px; 
            border-radius: 8px; 
            color: var(--text-muted); 
            cursor: pointer; 
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .nav-item.active { background: #EEF2FF; color: var(--accent); font-weight: 600; }

        /* MAIN CONTENT */
        main { flex: 1; overflow-y: auto; padding: 40px; }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* THE INPUT CARD */
        .input-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        input, textarea {
            width: 100%;
            border: 1px solid #E5E7EB;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: var(--accent); ring: 2px var(--accent); }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

        /* FEED CARDS */
        .post-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 16px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .post-card:hover { border-color: var(--accent); }
        
        .post-header { display: flex; align-items: center; margin-bottom: 12px; }
        .avatar-circle {
            width: 40px;
            height: 40px;
            background: #E0E7FF;
            border-radius: 50%;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: bold;
        }
        .post-author { font-weight: 600; color: var(--text-main); }
        .post-time { font-size: 0.8rem; color: var(--text-muted); margin-left: auto; }
        .post-body { color: #4B5563; line-height: 1.5; }

    </style>
</head>
<body>

    <nav>
        <h2>AuraForum</h2>
        <div class="nav-item active">General Discussion</div>
        <div class="nav-item">Game</div>
        <div class="nav-item">Study AI</div>
    </nav>

    <main>
        <div class="header-row">
            <h1>Activity Feed</h1>
        </div>

        <div class="input-card">
            <input type="text" id="nickname" placeholder="Choose a handle (e.g. AnonUser)">
            <textarea id="message" placeholder="Share your thoughts..."></textarea>
            <button class="btn-primary" id="submitBtn">Post to GitHub</button>
        </div>

        <div id="feed-container">
            </div>
    </main>

</body>
</html>
